# badprocess-guard process naming and tree aggregation rules.
#
# Matching is intentionally simple:
#   [tree-roots]  argv[0] basename -> aggregate this process and descendants
#   [exact]       argv[0] basename -> friendly display name
#   [contains]    full command line substring -> friendly display name
#
# Resolution order for visible names:
#   exact basename, contains substring, raw executable basename.
#
# No regexes, shell expansion, or command execution are used.

[tree-roots]
firefox=Firefox
thunderbird=Thunderbird
chrome=Chrome
chromium=Chromium
chromium-browser=Chromium
brave=Brave
brave-browser=Brave
vivaldi=Vivaldi
vivaldi-bin=Vivaldi
vivaldi-stable=Vivaldi
msedge=Microsoft Edge
microsoft-edge=Microsoft Edge
microsoft-edge-stable=Microsoft Edge
chrome.exe=Google Chrome
msedge.exe=Microsoft Edge
firefox.exe=Firefox
brave.exe=Brave
opera.exe=Opera
vivaldi.exe=Vivaldi

[exact]
7z=7-Zip
7z.exe=7-Zip
wrapper-2.0=XFCE Panel Plugin

[contains]
libdatetime.so=DateTime
libcpugraph.so=CPU Graph
libxfcetimer.so=Timer
libcpufreq.so=CPU Frequency
libtime-out.so=Time Out
libxfce4-sensors-plugin.so=Sensors
libscreenshooterplugin.so=Screenshot
libnetload.so=Network Monitor
libweather.so=Weather
libsystray.so=Status Tray
libclipman.so=Clipman
libbattery.so=Battery
libxfce4powermanager.so=Power Manager
libpulseaudio-plugin.so=PulseAudio
libxkb.so=Keyboard Layouts
libgenmon.so=Generic Monitor
libdiskperf.so=Disk Performance
